<!DOCTYPE html>
<html>

<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Sales Revenue</h2>

<canvas id="chart"></canvas>

<script>

const ctx = document.getElementById('chart');

new Chart(ctx, {
type: 'line',
data: {
labels: ['Jan','Feb','Mar','Apr','May'],
datasets: [{
label: 'Revenue',
data: [20000,25000,18000,30000,40000]
}]
}
});

</script>

</body>

</html>
